# FINO AI Server CI/CD Pipeline
# Builds Docker image and triggers ArgoCD deployment via FINO-infrastructure update

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: team-fino/fino-ai-server
  APP_NAME: fino-ai-server
  VALUES_PATH: helm/apps/fino-ai-server/values.yaml

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Update Infrastructure Repository
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          INFRA_REPO_TOKEN: ${{ secrets.INFRA_REPO_TOKEN }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          git clone https://x-access-token:${INFRA_REPO_TOKEN}@github.com/team-fino/FINO-infrastructure.git infra
          cd infra
          sed -i "s/tag: .*/tag: ${IMAGE_TAG}/" ${{ env.VALUES_PATH }}
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add ${{ env.VALUES_PATH }}
          git commit -m "chore: update ${{ env.APP_NAME }} image to ${IMAGE_TAG}" || echo "No changes"
          git push
