[pytest]
pythonpath = .

markers =
    integration: API-Celery integration tests with mocks (fast)
    e2e: End-to-end tests with real async workers (slow, requires running worker)

addopts = -v --tb=short

log_cli = true
log_cli_level = INFO

python_files = test_*.py
python_classes = Test*
python_functions = test_*