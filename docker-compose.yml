services:
  fino-ai-server:
    build:
      context: .
    container_name: fino-ai-server
    ports:
      - "8001:8001"
    env_file:
      - .env
    secrets:
      - neo4j_password
      - google_api_key
    environment:
      - HF_HOME=/app/cache
      - CONTAINER_TYPE=api
      - NEO4J_PASSWORD_FILE=/run/secrets/neo4j_password
      - GOOGLE_API_KEY_FILE=/run/secrets/google_api_key
    volumes:
      - huggingface_cache:/app/cache
      - fino_logs:/var/log/fino-ai
    shm_size: '4gb'
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE # 포트 바인딩에 필요한 최소한의 권한
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_started
      vllm-server:
        condition: service_started
      chromadb:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    restart: unless-stopped

  celery-worker:
    build:
      context: .
    container_name: celery-worker
    command: celery -A app.celery_worker.celery_app worker --loglevel=info -P solo
    env_file:
      - .env
    secrets:
      - neo4j_password
      - google_api_key
    environment:
      - HF_HOME=/app/cache
      - CONTAINER_TYPE=worker
      - NEO4J_PASSWORD_FILE=/run/secrets/neo4j_password
      - GOOGLE_API_KEY_FILE=/run/secrets/google_api_key
    volumes:
      - huggingface_cache:/app/cache
      - fino_logs:/var/log/fino-ai
    shm_size: '4gb'
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f 'celery.*worker' || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_started
      vllm-server:
        condition: service_started
      chromadb:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    restart: unless-stopped

  celery-beat:
    build:
      context: .
    container_name: celery-beat
    command: celery -A app.celery_worker.celery_app beat --loglevel=info -s /var/run/celery/celerybeat-schedule
    env_file:
      - .env
    secrets:
      - neo4j_password
    environment:
      - HF_HOME=/app/cache
      - CONTAINER_TYPE=beat
      - NEO4J_PASSWORD_FILE=/run/secrets/neo4j_password
    volumes:
      - celery_beat_schedule:/var/run/celery
    shm_size: '1gb'
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  vllm-server:
    image: vllm/vllm-openai:v0.6.6
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      - ./models:/root/.cache/huggingface/hub
    ports:
      - "8002:8000"
    command: >
      --model TechxGenus/Meta-Llama-3-8B-Instruct-GPTQ
      --quantization gptq_marlin
      --gpu-memory-utilization 0.9
      --trust-remote-code

  chromadb:
    image: chromadb/chroma:1.4.0
    container_name: chromadb
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "timeout 5 bash -c 'cat < /dev/null > /dev/tcp/localhost/8000' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  neo4j:
    image: neo4j:5.26-enterprise
    ports:
      - "7687:7687"
      - "7474:7474"
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD}
      - NEO4J_ACCEPT_LICENSE_AGREEMENT=yes
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "${NEO4J_PASSWORD}", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 2G

  rabbitmq:
    image: rabbitmq:4.0-management
    container_name: rabbitmq
    ports: ["5672:5672", "15672:15672"] # 15672는 관리자 UI 포트
    volumes:
      - ./rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf
    deploy:
      resources:
        limits:
          memory: 1G
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.4-alpine
    container_name: redis
    ports: ["6379:6379"]

  flower:
    image: mher/flower:2.0
    container_name: flower
    ports:
      - "5555:5555"
    environment:
      - CELERY_BROKER_URL=${CELERY_BROKER_URL}
      - FLOWER_BROKER_API=${CELERY_BROKER_URL}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND}
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_started
      celery-worker:
        condition: service_started

  redisinsight:
    image: redis/redisinsight:2.64
    container_name: redisinsight
    ports:
      - "5540:5540" 
    depends_on:
      - redis

volumes:
  huggingface_cache:
  fino_logs: {}
  celery_beat_schedule:
  neo4j_data:

secrets:
  neo4j_password:
    environment: "NEO4J_PASSWORD"
  google_api_key:
    environment: "GOOGLE_API_KEY"