services:
  fino-ai-server:
    build:
      context: .
    container_name: fino-ai-server
    ports:
      - "8001:8001"
    env_file:
      - .env
    environment:
      - HF_HOME=/app/cache
    volumes:
      - huggingface_cache:/app/cache
      - fino_logs:/var/log/fino-ai
    shm_size: '4gb'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_started
      vllm-server:
        condition: service_started
      chromadb:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    restart: unless-stopped

  celery-worker:
    build:
      context: .
    container_name: celery-worker
    command: celery -A app.celery_worker.celery_app worker --loglevel=info -P solo
    env_file:
      - .env
    environment:
      - HF_HOME=/app/cache
    volumes:
      - huggingface_cache:/app/cache
      - fino_logs:/var/log/fino-ai
    shm_size: '4gb'
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.celery_worker.celery_app inspect ping || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_started
      vllm-server:
        condition: service_started
      chromadb:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    restart: unless-stopped

  celery-beat:
    build:
      context: .
    container_name: celery-beat
    command: celery -A app.celery_worker.celery_app beat --loglevel=info -s /var/run/celery/celerybeat-schedule
    env_file:
      - .env
    environment:
      - HF_HOME=/app/cache
    volumes:
      - celery_beat_schedule:/var/run/celery
    shm_size: '1gb'
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  vllm-server:
    image: vllm/vllm-openai:latest
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      - ./models:/root/.cache/huggingface/hub
    ports:
      - "8002:8000"
    command: >
      --model TechxGenus/Meta-Llama-3-8B-Instruct-GPTQ
      --quantization gptq_marlin
      --gpu-memory-utilization 0.9
      --trust-remote-code

  chromadb:
    image: chromadb/chroma:latest
    container_name: chromadb
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 10s
      timeout: 5s
      retries: 3

  neo4j:
    image: neo4j:5-enterprise
    ports:
      - "7687:7687"
      - "7474:7474"
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD}
      - NEO4J_ACCEPT_LICENSE_AGREEMENT=yes
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "${NEO4J_PASSWORD}", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports: ["5672:5672", "15672:15672"] # 15672는 관리자 UI 포트
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:latest
    container_name: redis
    ports: ["6379:6379"]

  flower:
    image: mher/flower
    container_name: flower
    ports:
      - "5555:5555"
    environment:
      - CELERY_BROKER_URL=${CELERY_BROKER_URL}
      - FLOWER_BROKER_API=${CELERY_BROKER_URL}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND}
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_started
      celery-worker:
        condition: service_started

  redisinsight:
    image: redis/redisinsight:latest
    container_name: redisinsight
    ports:
      - "5540:5540" 
    depends_on:
      - redis

volumes:
  huggingface_cache:
  fino_logs: {}
  celery_beat_schedule:
  neo4j_data: